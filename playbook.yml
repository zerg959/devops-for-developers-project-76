---
- name: Setup webservers with pip and docker
  hosts: all
  become: yes
  vars:
    pip_install_packages:
      - name: docker
  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Deploy Redmine via Docker
  hosts: webservers
  become: yes

  vars_files:
    - group_vars/webservers/main.yml

  tasks:
    - name: Pull Redmine Docker image
      docker_image:
        name: redmine
        source: pull

    - name: Run Redmine container
      docker_container:
        name: redmine
        image: redmine
        state: started
        recreate: yes
        ports:
          - "{{ redmine_port }}:3000"
        restart_policy: always